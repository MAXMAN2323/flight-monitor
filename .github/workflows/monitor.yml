# 机票低价监控工作流
name: flight-price-monitor

on:
  schedule:
    # 每 15 分钟运行一次（GitHub 对定时任务不保证精准，高峰期可能延迟或合并，属正常现象）
    - cron: "*/15 * * * *"
  # 允许在 GitHub 网页上手动点按钮运行（用于测试）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 取回上次的提醒记录（去重用）
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: alert-state-

      - name: 运行监控脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: python flight_monitor.py

      - name: 保存本次的提醒记录
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: alert-state-${{ github.run_id }}
